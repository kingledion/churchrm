services:
  postgres:
    image: postgres:16-alpine
    container_name: churchrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-churchrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-churchrm}
      POSTGRES_DB: ${POSTGRES_DB:-churchrm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-churchrm} -d ${POSTGRES_DB:-churchrm}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
